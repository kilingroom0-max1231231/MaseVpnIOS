name: MaseVpnIOS
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  MaseVpnIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    settings:
      base:
        PRODUCT_NAME: MaseVpnIOS
        PRODUCT_BUNDLE_IDENTIFIER: online.maseai.vpnclient.ios
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
